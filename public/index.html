<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Plotweave — An Adventure</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=EB+Garamond:ital@0;1&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #14110d;
        --panel: #1f1b15;
        --ink: #ece3d0;
        --ink-soft: #b9ad94;
        --gold: #c9a25a;
        --gold-bright: #e7c684;
        --ember: #b5562a;
        --line: #3a3227;
        --shadow: rgba(0, 0, 0, 0.55);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
      }

      body {
        font-family: "EB Garamond", Georgia, serif;
        color: var(--ink);
        background:
          radial-gradient(1200px 700px at 50% -10%, #2a2318 0%, var(--bg) 60%);
        min-height: 100vh;
        display: flex;
        align-items: flex-start;
        justify-content: center;
        padding: 4vh 16px 8vh;
      }

      /* Drifting-ember canvas sits above the background, below the content. */
      #embers {
        position: fixed;
        inset: 0;
        z-index: 0;
        pointer-events: none;
      }

      .vignette {
        position: fixed;
        inset: 0;
        z-index: 1;
        pointer-events: none;
        box-shadow: inset 0 0 220px 60px rgba(0, 0, 0, 0.7);
      }

      .book {
        width: min(760px, 100%);
        background: linear-gradient(180deg, #221d16, var(--panel));
        border: 1px solid var(--line);
        border-radius: 14px;
        box-shadow: 0 30px 70px var(--shadow);
        padding: clamp(22px, 4vw, 48px);
        position: relative;
        z-index: 2;
      }

      .screen.hidden,
      .hidden {
        display: none !important;
      }

      /* ---------- Start screen ---------- */
      #start-screen,
      #password-screen {
        animation: rise 0.8s ease both;
      }

      @keyframes rise {
        from {
          opacity: 0;
          transform: translateY(16px);
        }
        to {
          opacity: 1;
          transform: none;
        }
      }

      .title {
        font-family: "Cinzel", serif;
        font-weight: 700;
        font-size: clamp(2.2rem, 6vw, 3.4rem);
        letter-spacing: 0.05em;
        text-align: center;
        margin: 0;
        /* Animated golden shimmer swept across the letters. */
        background: linear-gradient(
          100deg,
          var(--gold) 0%,
          var(--gold-bright) 25%,
          #fff3d6 50%,
          var(--gold-bright) 75%,
          var(--gold) 100%
        );
        background-size: 200% auto;
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        -webkit-text-fill-color: transparent;
        animation: shimmer 6s linear infinite, glow 3.4s ease-in-out infinite;
      }

      @keyframes shimmer {
        to {
          background-position: 200% center;
        }
      }

      @keyframes glow {
        0%,
        100% {
          filter: drop-shadow(0 0 6px rgba(201, 162, 90, 0.25));
        }
        50% {
          filter: drop-shadow(0 0 20px rgba(231, 198, 132, 0.55));
        }
      }

      .subtitle {
        text-align: center;
        font-style: italic;
        color: var(--ink-soft);
        margin: 0.4rem 0 2rem;
        font-size: 1.15rem;
      }

      .prompt-label {
        text-align: center;
        color: var(--ink-soft);
        letter-spacing: 0.03em;
        margin-bottom: 1rem;
      }

      .theme-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
        gap: 12px;
        margin-bottom: 1.6rem;
      }

      .theme-card {
        position: relative;
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 16px 18px;
        font-family: "EB Garamond", serif;
        font-size: 1.1rem;
        color: var(--ink);
        background: #241f18;
        border: 1px solid var(--line);
        border-radius: 10px;
        cursor: pointer;
        transition: transform 0.12s ease, border-color 0.2s ease, background 0.2s ease;
      }

      .theme-card:hover {
        transform: translateY(-2px);
        border-color: var(--gold);
        background: #2c251b;
        box-shadow: 0 6px 22px rgba(201, 162, 90, 0.18);
      }

      .theme-card.selected {
        border-color: var(--gold-bright);
        background: #332a1d;
        box-shadow: inset 0 0 0 1px var(--gold), 0 6px 22px rgba(201, 162, 90, 0.22);
      }

      .theme-card.selected::after {
        content: "✓";
        position: absolute;
        top: 7px;
        right: 11px;
        font-size: 0.95rem;
        color: var(--gold-bright);
      }

      /* Primary "begin" button for the selected genre blend. */
      .begin-adventure {
        display: block;
        width: 100%;
        margin: 0 0 1.1rem;
        padding: 14px 22px;
        font-family: "Cinzel", serif;
        font-size: 1.05rem;
        letter-spacing: 0.04em;
        color: #1a150e;
        background: linear-gradient(180deg, var(--gold-bright), var(--gold));
        border: none;
        border-radius: 10px;
        cursor: pointer;
        transition: filter 0.15s ease, opacity 0.2s ease;
      }

      .begin-adventure:hover:not(:disabled) {
        filter: brightness(1.08);
      }

      .begin-adventure:disabled {
        opacity: 0.45;
        cursor: default;
        color: #3a3024;
      }

      .theme-hint.warn {
        color: var(--ember);
      }

      /* "or" divider between the genre blend and the custom-theme box. */
      .or-divider {
        display: flex;
        align-items: center;
        text-align: center;
        color: var(--ink-soft);
        font-style: italic;
        margin: 0.2rem 0 1rem;
      }

      .or-divider::before,
      .or-divider::after {
        content: "";
        flex: 1;
        height: 1px;
        background: var(--line);
      }

      .or-divider span {
        padding: 0 12px;
      }

      .theme-icon {
        font-size: 1.5rem;
      }

      .custom-theme,
      .custom-action {
        display: flex;
        gap: 10px;
      }

      input[type="text"] {
        flex: 1;
        padding: 13px 16px;
        font-family: "EB Garamond", serif;
        font-size: 1.05rem;
        color: var(--ink);
        background: #19150f;
        border: 1px solid var(--line);
        border-radius: 10px;
        outline: none;
        transition: border-color 0.2s ease;
      }

      input[type="text"]:focus {
        border-color: var(--gold);
      }

      input[type="text"]::placeholder {
        color: #6f6552;
        font-style: italic;
      }

      .begin-btn,
      .action-btn {
        padding: 0 22px;
        font-family: "Cinzel", serif;
        font-size: 1rem;
        letter-spacing: 0.04em;
        color: #1a150e;
        background: linear-gradient(180deg, var(--gold-bright), var(--gold));
        border: none;
        border-radius: 10px;
        cursor: pointer;
        transition: filter 0.15s ease;
      }

      .begin-btn:hover,
      .action-btn:hover {
        filter: brightness(1.08);
      }

      /* ---------- Game screen ---------- */
      .story {
        font-size: clamp(1.12rem, 2.4vw, 1.32rem);
        line-height: 1.75;
        margin-bottom: 1.8rem;
        white-space: pre-wrap;
      }

      /* Small "Scene N" progress marker above each scene. */
      .scene-marker {
        margin: 0 0 0.5rem;
        font-family: "Cinzel", serif;
        font-size: 0.72rem;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--gold);
        opacity: 0.6;
      }

      .scene {
        margin: 0 0 1.4rem;
      }

      /* Blinking cursor shown at the end of a scene while it streams in. */
      .scene.streaming::after {
        content: "▋";
        margin-left: 1px;
        color: var(--gold);
        animation: caret 1s step-end infinite;
      }

      @keyframes caret {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0;
        }
      }

      /* The action the player took, shown above the scene it led to. */
      .action-taken {
        margin: 1.9rem 0 0.9rem;
        padding-top: 1.4rem;
        border-top: 1px solid var(--line);
        color: var(--gold);
        font-style: italic;
        font-size: 1.02rem;
        opacity: 0.9;
      }

      /* Drop cap only on the very first scene of the tale. */
      .story .scene:first-of-type::first-letter {
        font-family: "Cinzel", serif;
        font-size: 3.1rem;
        float: left;
        line-height: 0.8;
        padding: 6px 10px 0 0;
        color: var(--gold-bright);
      }

      .choices {
        display: flex;
        flex-direction: column;
        gap: 12px;
        margin-bottom: 1.6rem;
      }

      .choice {
        text-align: left;
        padding: 15px 20px;
        font-family: "EB Garamond", serif;
        font-size: 1.12rem;
        color: var(--ink);
        background: #241f18;
        border: 1px solid var(--line);
        border-left: 3px solid var(--gold);
        border-radius: 10px;
        cursor: pointer;
        transition: transform 0.12s ease, background 0.2s ease, border-color 0.2s ease;
      }

      .choice:hover {
        transform: translateX(4px);
        background: #2c251b;
        border-left-color: var(--ember);
      }

      .choice .num {
        color: var(--gold);
        font-family: "Cinzel", serif;
        margin-right: 12px;
      }

      .game-actions {
        display: flex;
        gap: 12px;
        justify-content: center;
        flex-wrap: wrap;
        margin-top: 1.8rem;
      }

      .game-actions .restart {
        margin: 0;
      }

      .restart {
        display: block;
        margin: 1.8rem auto 0;
        padding: 9px 18px;
        font-family: "EB Garamond", serif;
        font-size: 0.95rem;
        color: var(--ink-soft);
        background: transparent;
        border: 1px solid var(--line);
        border-radius: 8px;
        cursor: pointer;
        transition: color 0.2s ease, border-color 0.2s ease;
      }

      .restart:hover {
        color: var(--ink);
        border-color: var(--gold);
      }

      /* ---------- Loader ---------- */
      .loader {
        text-align: center;
        padding: 2.5rem 0 1rem;
        color: var(--ink-soft);
        font-style: italic;
      }

      .quill {
        font-size: 2.4rem;
        animation: sway 1.4s ease-in-out infinite;
      }

      @keyframes sway {
        0%, 100% { transform: rotate(-8deg) translateY(0); }
        50% { transform: rotate(8deg) translateY(-6px); }
      }

      .error {
        color: #e8a07a;
        text-align: center;
        font-style: italic;
        margin-top: 1rem;
      }

      .error-banner {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 10px;
        margin-bottom: 1.4rem;
        padding: 16px;
        background: #2a1f18;
        border: 1px solid #5a3b2a;
        border-radius: 10px;
      }

      .error-banner .error {
        margin: 0;
      }

      .error-banner .action-btn {
        padding: 9px 22px;
      }

      /* ---------- New-adventure confirmation modal ---------- */
      .modal {
        position: fixed;
        inset: 0;
        z-index: 5;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
        background: rgba(10, 8, 5, 0.72);
      }

      .modal-card {
        width: min(420px, 100%);
        background: linear-gradient(180deg, #241f18, var(--panel));
        border: 1px solid var(--line);
        border-radius: 14px;
        box-shadow: 0 30px 70px var(--shadow);
        padding: 26px 26px 22px;
        text-align: center;
        animation: rise 0.3s ease both;
      }

      .modal-title {
        font-family: "Cinzel", serif;
        color: var(--gold-bright);
        margin: 0 0 0.5rem;
        font-size: 1.4rem;
      }

      .modal-text {
        color: var(--ink-soft);
        margin: 0 0 1.4rem;
      }

      .modal-actions {
        display: flex;
        gap: 10px;
        justify-content: center;
        flex-wrap: wrap;
      }

      .modal-btn {
        padding: 11px 20px;
        font-family: "Cinzel", serif;
        font-size: 0.95rem;
        letter-spacing: 0.03em;
        color: #1a150e;
        background: linear-gradient(180deg, var(--gold-bright), var(--gold));
        border: none;
        border-radius: 9px;
        cursor: pointer;
        transition: filter 0.15s ease, color 0.2s ease, border-color 0.2s ease;
      }

      .modal-btn:hover {
        filter: brightness(1.08);
      }

      .modal-btn.ghost {
        color: var(--ink-soft);
        background: transparent;
        border: 1px solid var(--line);
      }

      .modal-btn.ghost:hover {
        color: var(--ink);
        border-color: var(--gold);
      }
    </style>
  </head>
  <body>
    <canvas id="embers" aria-hidden="true"></canvas>
    <div class="vignette"></div>
    <main class="book">
      <!-- Password screen -->
      <section id="password-screen" class="screen hidden">
        <h1 class="title">Plotweave</h1>
        <p class="subtitle">Enter the password to begin.</p>
        <form id="password-form" class="custom-theme">
          <input
            id="password-input"
            type="password"
            placeholder="Password"
            autocomplete="off"
          />
          <button type="submit" class="begin-btn">Enter ▸</button>
        </form>
        <p id="password-error" class="error"></p>
      </section>

      <!-- Title / theme-selection screen -->
      <section id="start-screen" class="screen hidden">
        <h1 class="title">Plotweave</h1>
        <p class="subtitle">An adventure written as you play.</p>

        <p id="theme-hint" class="prompt-label">Pick 1–3 genres to blend — or invent your own:</p>
        <div id="theme-grid" class="theme-grid">
          <button class="theme-card" data-theme="High fantasy — ancient kingdoms, dragons, and forgotten magic">
            <span class="theme-icon">🏰</span><span>High Fantasy</span>
          </button>
          <button class="theme-card" data-theme="Deep space — a derelict starship drifting through the silent void">
            <span class="theme-icon">🚀</span><span>Deep Space</span>
          </button>
          <button class="theme-card" data-theme="Science fiction — distant futures, alien worlds, and impossible technology">
            <span class="theme-icon">🛸</span><span>Sci-Fi</span>
          </button>
          <button class="theme-card" data-theme="Post-apocalypse — survival in the ruins of a fallen world">
            <span class="theme-icon">🧟</span><span>Post-Apocalypse</span>
          </button>
          <button class="theme-card" data-theme="High seas — pirates, buried treasure, and uncharted waters">
            <span class="theme-icon">🏴‍☠️</span><span>High Seas</span>
          </button>
          <button class="theme-card" data-theme="War — soldiers, trenches, and impossible orders on a brutal front">
            <span class="theme-icon">🪖</span><span>War</span>
          </button>
          <button class="theme-card" data-theme="Wild West — dusty frontier towns, gunslingers, and buried gold">
            <span class="theme-icon">🤠</span><span>Wild West</span>
          </button>
          <button class="theme-card" data-theme="Cyberpunk — a neon megacity of hackers, megacorps, and endless rain">
            <span class="theme-icon">🌆</span><span>Cyberpunk</span>
          </button>
          <button class="theme-card" data-theme="Time travel — leaping across eras while dodging paradoxes that could unmake everything">
            <span class="theme-icon">⏳</span><span>Time Travel</span>
          </button>
          <button class="theme-card" data-theme="Mythic Greece — gods, monsters, and heroes bound by fate">
            <span class="theme-icon">🏛️</span><span>Mythic Greece</span>
          </button>
          <button class="theme-card" data-theme="Spy thriller — espionage, gadgets, and double agents out in the cold">
            <span class="theme-icon">🕴️</span><span>Spy Thriller</span>
          </button>
          <button class="theme-card" data-theme="Superhero — powers, secret identities, and a city that needs saving">
            <span class="theme-icon">🦸</span><span>Superhero</span>
          </button>
        </div>

        <button id="begin-selected" class="begin-adventure" disabled>
          Pick a genre to begin
        </button>

        <div class="or-divider"><span>or</span></div>

        <form id="custom-theme-form" class="custom-theme">
          <input
            id="custom-theme-input"
            type="text"
            placeholder="Type your own theme or mashup…"
            autocomplete="off"
          />
          <button type="submit" class="begin-btn">Begin ▸</button>
        </form>
      </section>

      <!-- Story / play screen -->
      <section id="game-screen" class="screen hidden">
        <div id="story" class="story"></div>

        <div id="choices" class="choices"></div>

        <form id="custom-action-form" class="custom-action">
          <input
            id="custom-action-input"
            type="text"
            placeholder="Or do something else entirely…"
            autocomplete="off"
          />
          <button type="submit" class="action-btn">Act ▸</button>
        </form>

        <div class="game-actions">
          <button id="copy-btn" class="restart">⧉ Copy story</button>
          <button id="restart-btn" class="restart">⟲ New Adventure</button>
        </div>
      </section>

      <!-- Loading indicator -->
      <div id="loader" class="loader hidden">
        <div class="quill">🖋️</div>
        <p id="loader-text">The storyteller is writing…</p>
      </div>

      <!-- New-adventure confirmation -->
      <div id="confirm-modal" class="modal hidden">
        <div class="modal-card">
          <h2 class="modal-title">Start a new adventure?</h2>
          <p class="modal-text">This will erase your current story for good.</p>
          <div class="modal-actions">
            <button id="confirm-cancel" class="modal-btn ghost">Keep playing</button>
            <button id="confirm-new" class="modal-btn">Erase &amp; start new</button>
          </div>
        </div>
      </div>
    </main>

    <script>
      // ---- Element references ----
      const passwordScreen = document.getElementById("password-screen");
      const passwordForm = document.getElementById("password-form");
      const passwordInput = document.getElementById("password-input");
      const passwordError = document.getElementById("password-error");

      const startScreen = document.getElementById("start-screen");
      const gameScreen = document.getElementById("game-screen");
      const loader = document.getElementById("loader");

      const storyEl = document.getElementById("story");
      const choicesEl = document.getElementById("choices");

      const themeGrid = document.getElementById("theme-grid");
      const themeHint = document.getElementById("theme-hint");
      const beginSelected = document.getElementById("begin-selected");
      const customThemeForm = document.getElementById("custom-theme-form");
      const customThemeInput = document.getElementById("custom-theme-input");

      const customActionForm = document.getElementById("custom-action-form");
      const customActionInput = document.getElementById("custom-action-input");
      const restartBtn = document.getElementById("restart-btn");
      const copyBtn = document.getElementById("copy-btn");
      const confirmModal = document.getElementById("confirm-modal");
      const confirmNew = document.getElementById("confirm-new");
      const confirmCancel = document.getElementById("confirm-cancel");

      // ---- Game state ----
      // The full conversation history is kept here and round-tripped to the server,
      // which stays stateless.
      let history = [];
      let busy = false;
      let lastTurn = null; // a function that re-runs the most recent turn (for retry)
      let appPassword = sessionStorage.getItem("plotweave_pw") || ""; // gate password
      let pendingAction = null; // the action that triggered the in-flight turn
      let summary = ""; // running summary of older scenes (cost saver)
      const KEEP_RECENT_TURNS = 5; // recent turns kept word-for-word
      const SUMMARIZE_AFTER_TURNS = 9; // begin folding older turns past this length

      // ---- Story streaming ----
      const DELIM = "###CHOICES###";
      let currentTurnEls = []; // DOM nodes for the in-progress turn (removed on failure)

      // Strip stray tags / collapse spaces, but keep paragraph newlines.
      function tidy(s) {
        return s.replace(/<[^>]+>/g, " ").replace(/[ \t]+/g, " ").trim();
      }

      // While streaming, hide a half-arrived "###CHOICES###" separator at the tail.
      function tidyLive(s) {
        return s
          .replace(/#+\s*C?H?O?I?C?E?S?\s*#*\s*$/i, "")
          .replace(/<[^>]+>/g, " ")
          .trimEnd();
      }

      function parseChoices(text) {
        const choices = text
          .split(/\n+/)
          .map((l) => tidy(l.replace(/^\s*(?:\d+[.)\-:]|[-*•])\s*/, "")))
          .filter((c) => c.replace(/[^a-zA-Z]/g, "").length >= 4)
          .slice(0, 3);
        while (choices.length < 3) {
          choices.push("Press onward into whatever comes next.");
        }
        return choices;
      }

      function removeCurrentTurnEls() {
        currentTurnEls.forEach((el) => el.remove());
        currentTurnEls = [];
      }

      // ---- Cost saver: keep recent turns verbatim, fold older ones into a summary ----
      function buildMessages(userMsg) {
        const arr = [];
        if (summary) {
          arr.push({
            role: "user",
            content: `Story so far (summary of earlier events, for continuity): ${summary}`,
          });
        }
        arr.push(...history);
        arr.push({ role: "user", content: userMsg });
        return arr;
      }

      async function requestSummary(prior, olderMessages) {
        try {
          const res = await fetch("/api/summarize", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              "x-app-password": appPassword,
            },
            body: JSON.stringify({ summary: prior, messages: olderMessages }),
          });
          if (!res.ok) return prior; // on failure, keep everything verbatim and retry later
          const data = await res.json();
          return (data.summary || prior).trim();
        } catch {
          return prior;
        }
      }

      async function maybeSummarize() {
        const turns = history.length / 2;
        if (turns < SUMMARIZE_AFTER_TURNS) return;
        const keep = KEEP_RECENT_TURNS * 2;
        const older = history.slice(0, history.length - keep);
        const updated = await requestSummary(summary, older);
        // Only drop the older turns once they're safely captured in the summary.
        if (updated && updated !== summary) {
          summary = updated;
          history = history.slice(history.length - keep);
        }
      }

      // ---- Turn handling ----
      async function startAdventure(theme) {
        if (busy || !theme) return;
        history = [];
        summary = "";
        showScreen("game");
        storyEl.innerHTML = ""; // fresh tale
        choicesEl.innerHTML = "";
        currentTurnEls = [];
        pendingAction = null;
        const userMsg =
          `Begin a brand new adventure with this theme or setting: "${theme}". ` +
          "Write the opening scene and the first three choices.";
        lastTurn = () => streamStory(userMsg);
        await runTurn();
      }

      async function takeAction(action) {
        if (busy || !action) return;
        // history isn't committed until a turn succeeds, so retrying replays the same turn.
        pendingAction = action;
        const userMsg = `The player chooses: ${action}`;
        lastTurn = () => streamStory(userMsg);
        await runTurn();
      }

      async function runTurn() {
        if (!lastTurn) return;
        clearError();
        setBusy(true);
        try {
          await lastTurn();
        } catch (err) {
          removeCurrentTurnEls();
          renderError(err.message);
        } finally {
          setBusy(false);
        }
      }

      // Streams one scene into the page word-by-word, then renders the choices.
      async function streamStory(userMsg) {
        removeCurrentTurnEls(); // clear any partial leftover from a failed attempt
        const messages = buildMessages(userMsg);

        // Build this turn's DOM up front so text can stream into it.
        if (pendingAction) {
          const taken = document.createElement("p");
          taken.className = "action-taken";
          taken.textContent = "❯ " + pendingAction;
          storyEl.appendChild(taken);
          currentTurnEls.push(taken);
        }

        const sceneNum = storyEl.querySelectorAll(".scene").length + 1;
        const marker = document.createElement("p");
        marker.className = "scene-marker";
        marker.textContent = `Scene ${sceneNum}`;
        storyEl.appendChild(marker);
        currentTurnEls.push(marker);

        const sceneEl = document.createElement("p");
        sceneEl.className = "scene streaming"; // blinking caret while it writes
        storyEl.appendChild(sceneEl);
        currentTurnEls.push(sceneEl);
        currentTurnEls[0].scrollIntoView({ behavior: "smooth", block: "start" });

        const res = await fetch("/api/story", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "x-app-password": appPassword,
          },
          body: JSON.stringify({ messages }),
        });

        if (res.status === 401) {
          // Password missing/changed — back to the login screen.
          sessionStorage.removeItem("plotweave_pw");
          appPassword = "";
          removeCurrentTurnEls();
          showScreen("password");
          passwordError.textContent = "Please enter the password again.";
          throw new Error("Password required.");
        }
        if (!res.ok || !res.body) {
          const { error } = await res.json().catch(() => ({}));
          throw new Error(error || "Something went wrong.");
        }

        // Read the streamed text and render it live.
        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let full = "";
        let sceneFixed = false;
        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          full += decoder.decode(value, { stream: true });
          const idx = full.indexOf(DELIM);
          if (idx === -1) {
            sceneEl.textContent = tidyLive(full);
            sceneEl.scrollIntoView({ behavior: "smooth", block: "nearest" });
          } else if (!sceneFixed) {
            sceneEl.textContent = tidy(full.slice(0, idx)); // scene is complete
            sceneFixed = true;
          }
        }

        // Finalise scene + choices.
        const idx = full.indexOf(DELIM);
        const scene = tidy(idx === -1 ? full : full.slice(0, idx));
        sceneEl.textContent = scene;
        sceneEl.classList.remove("streaming");
        renderChoices(parseChoices(idx === -1 ? "" : full.slice(idx + DELIM.length)));

        // Commit this turn to the permanent story + history.
        history = [
          ...history,
          { role: "user", content: userMsg },
          { role: "assistant", content: scene },
        ];
        currentTurnEls = [];
        pendingAction = null;
        await maybeSummarize(); // fold older turns into a summary once the story is long
      }

      function renderChoices(choices) {
        choicesEl.innerHTML = "";
        choices.forEach((choice, i) => {
          const btn = document.createElement("button");
          btn.className = "choice";
          btn.innerHTML = `<span class="num">${i + 1}</span>${escapeHtml(choice)}`;
          btn.addEventListener("click", () => takeAction(choice));
          choicesEl.appendChild(btn);
        });
      }

      function renderError(message) {
        clearError();
        const banner = document.createElement("div");
        banner.id = "error-banner";
        banner.className = "error-banner";
        banner.innerHTML = `<p class="error">${escapeHtml(message)}</p>`;

        const retry = document.createElement("button");
        retry.className = "action-btn";
        retry.textContent = "↻ Try again";
        retry.addEventListener("click", () => runTurn());
        banner.appendChild(retry);

        // Insert above the choices so your existing options stay clickable too.
        choicesEl.parentNode.insertBefore(banner, choicesEl);
      }

      function clearError() {
        document.getElementById("error-banner")?.remove();
      }

      function setBusy(state) {
        busy = state;
        // Dim the controls while a scene is being written.
        choicesEl.style.opacity = state ? "0.35" : "1";
        customActionForm.style.opacity = state ? "0.35" : "1";
      }

      function showScreen(which) {
        passwordScreen.classList.toggle("hidden", which !== "password");
        startScreen.classList.toggle("hidden", which !== "start");
        gameScreen.classList.toggle("hidden", which !== "game");
      }

      // ---- Password gate ----
      async function tryLogin(pw) {
        try {
          const res = await fetch("/api/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ password: pw }),
          });
          return res.ok;
        } catch {
          return false;
        }
      }

      async function init() {
        try {
          const cfg = await fetch("/api/config").then((r) => r.json());
          if (!cfg.passwordRequired) {
            showScreen("start"); // no gate configured
            return;
          }
          // Gate is on: reuse a remembered password, else ask for it.
          if (appPassword && (await tryLogin(appPassword))) {
            showScreen("start");
          } else {
            showScreen("password");
          }
        } catch {
          // If we can't reach the server (e.g. the static preview), just show the menu.
          showScreen("start");
        }
      }

      function escapeHtml(str) {
        const div = document.createElement("div");
        div.textContent = str;
        return div.innerHTML;
      }

      // ---- Theme selection (blend up to 3 genres) ----
      const MAX_THEMES = 3;
      const DEFAULT_HINT = "Pick 1–3 genres to blend — or invent your own:";
      let selection = []; // selected card elements, in pick order
      let hintTimer;

      function updateBeginButton() {
        const n = selection.length;
        beginSelected.disabled = n === 0;
        beginSelected.textContent =
          n === 0
            ? "Pick a genre to begin"
            : n === 1
              ? "Begin Adventure ▸"
              : `Blend ${n} genres ▸`;
      }

      function clearSelection() {
        selection.forEach((c) => c.classList.remove("selected"));
        selection = [];
        themeHint.textContent = DEFAULT_HINT;
        themeHint.classList.remove("warn");
        updateBeginButton();
      }

      function combinedTheme(list) {
        if (list.length === 1) return list[0];
        return (
          "A single, cohesive story that blends these genres into one world: " +
          list.join("  +  ") +
          ". Weave them together seamlessly rather than treating them as separate settings."
        );
      }

      // ---- Event wiring ----
      themeGrid.addEventListener("click", (e) => {
        const card = e.target.closest(".theme-card");
        if (!card) return;
        const idx = selection.indexOf(card);
        if (idx >= 0) {
          selection.splice(idx, 1);
          card.classList.remove("selected");
        } else if (selection.length >= MAX_THEMES) {
          themeHint.textContent = "You can blend up to 3 — deselect one first.";
          themeHint.classList.add("warn");
          clearTimeout(hintTimer);
          hintTimer = setTimeout(() => {
            themeHint.textContent = DEFAULT_HINT;
            themeHint.classList.remove("warn");
          }, 1800);
          return;
        } else {
          selection.push(card);
          card.classList.add("selected");
        }
        updateBeginButton();
      });

      beginSelected.addEventListener("click", () => {
        if (!selection.length) return;
        const themes = selection.map((c) => c.dataset.theme);
        clearSelection();
        startAdventure(combinedTheme(themes));
      });

      customThemeForm.addEventListener("submit", (e) => {
        e.preventDefault();
        const theme = customThemeInput.value.trim();
        if (theme) startAdventure(theme);
      });

      customActionForm.addEventListener("submit", (e) => {
        e.preventDefault();
        const action = customActionInput.value.trim();
        if (action) {
          customActionInput.value = "";
          takeAction(action);
        }
      });

      function startNewAdventure() {
        confirmModal.classList.add("hidden");
        customThemeInput.value = "";
        clearSelection();
        showScreen("start");
      }

      restartBtn.addEventListener("click", () => {
        if (busy) return;
        // Only ask once the player has progressed past the opening scene.
        const sceneCount = storyEl.querySelectorAll(".scene").length;
        if (sceneCount >= 2) {
          confirmModal.classList.remove("hidden");
        } else {
          startNewAdventure();
        }
      });

      // ---- Copy the whole story to the clipboard ----
      async function copyText(text) {
        try {
          if (navigator.clipboard && window.isSecureContext) {
            await navigator.clipboard.writeText(text);
            return true;
          }
        } catch {
          /* fall through to the textarea fallback */
        }
        try {
          const ta = document.createElement("textarea");
          ta.value = text;
          ta.style.position = "fixed";
          ta.style.opacity = "0";
          document.body.appendChild(ta);
          ta.select();
          const ok = document.execCommand("copy");
          ta.remove();
          return ok;
        } catch {
          return false;
        }
      }

      copyBtn.addEventListener("click", async () => {
        const text = storyEl.innerText.trim(); // all scenes + actions, as shown
        if (!text) return;
        const ok = await copyText(text);
        copyBtn.textContent = ok ? "✓ Copied!" : "Couldn't copy";
        setTimeout(() => (copyBtn.textContent = "⧉ Copy story"), 1600);
      });

      confirmNew.addEventListener("click", startNewAdventure);
      confirmCancel.addEventListener("click", () =>
        confirmModal.classList.add("hidden"),
      );
      // Dismiss by clicking the dark backdrop or pressing Escape.
      confirmModal.addEventListener("click", (e) => {
        if (e.target === confirmModal) confirmModal.classList.add("hidden");
      });
      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape") confirmModal.classList.add("hidden");
      });

      passwordForm.addEventListener("submit", async (e) => {
        e.preventDefault();
        const pw = passwordInput.value;
        if (!pw) return;
        passwordError.textContent = "Checking…";
        if (await tryLogin(pw)) {
          appPassword = pw;
          sessionStorage.setItem("plotweave_pw", pw);
          passwordError.textContent = "";
          passwordInput.value = "";
          showScreen("start");
        } else {
          passwordError.textContent = "Incorrect password — try again.";
          passwordInput.select();
        }
      });

      // Decide which screen to show first (password gate or straight to the menu).
      init();

      // ---- Drifting golden embers on the background ----
      (function () {
        const canvas = document.getElementById("embers");
        const ctx = canvas.getContext("2d");
        let w, h, embers;

        function makeEmber() {
          const hero = Math.random() < 0.14; // ~1 in 7 is a brighter "hero" spark
          const baseR = (0.8 + Math.random() * 2.2) * 1.5; // 50% bigger overall
          return {
            x: Math.random() * w,
            y: Math.random() * h,
            r: hero ? baseR * 1.7 : baseR, // core size (heroes larger still)
            drift: 0.4 + Math.random() * 0.9, // how far it sways sideways
            phase: Math.random() * Math.PI * 2,
            sway: (0.4 + Math.random() * 0.8) * 1.3, // sway speed (30% faster)
            speed: (0.12 + Math.random() * 0.4) * 1.3, // upward rise (30% faster)
            alpha: hero ? 0.78 + Math.random() * 0.22 : 0.32 + Math.random() * 0.62,
            twinkle: 0.6 + Math.random() * 1.4, // brightness flicker speed
            hero,
          };
        }

        function resize() {
          w = canvas.width = window.innerWidth;
          h = canvas.height = window.innerHeight;
          // Particle count scales gently with screen size (~2.5x density).
          const count = Math.min(125, Math.max(50, Math.round((w * h) / 16800)));
          embers = Array.from({ length: count }, makeEmber);
        }

        let t = 0;
        function frame() {
          t += 0.016;
          ctx.clearRect(0, 0, w, h);
          for (const e of embers) {
            e.y -= e.speed;
            e.phase += 0.01 * e.sway;
            const x = e.x + Math.sin(e.phase) * e.drift * 14;
            // Once it floats off the top, respawn at the bottom.
            if (e.y < -12) {
              e.y = h + 12;
              e.x = Math.random() * w;
            }
            const flicker =
              e.alpha * (0.7 + 0.3 * Math.sin(t * e.twinkle + e.phase));
            const radius = e.r * 4;
            // Hero sparks get a brighter, near-white warm core.
            const core = e.hero ? "255, 240, 205" : "231, 198, 132";
            const g = ctx.createRadialGradient(x, e.y, 0, x, e.y, radius);
            g.addColorStop(0, `rgba(${core}, ${flicker})`);
            g.addColorStop(0.4, `rgba(201, 162, 90, ${flicker * 0.5})`);
            g.addColorStop(1, "rgba(201, 162, 90, 0)");
            ctx.fillStyle = g;
            ctx.beginPath();
            ctx.arc(x, e.y, radius, 0, Math.PI * 2);
            ctx.fill();
          }
          requestAnimationFrame(frame);
        }

        window.addEventListener("resize", resize);
        resize();
        frame();
      })();
    </script>
  </body>
</html>
